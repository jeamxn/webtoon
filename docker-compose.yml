services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_TEXT_MODEL: ${OPENAI_TEXT_MODEL:-gpt-5.5}
      OPENAI_IMAGE_MODEL: ${OPENAI_IMAGE_MODEL:-gpt-image-2}
      API_PORT: 4000
    volumes:
      - webtoon-data:/app/data
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      - api
    ports:
      - "3000:80"

volumes:
  webtoon-data:
