services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:17-alpine}
    environment:
      POSTGRES_USER: webtoon
      POSTGRES_PASSWORD: webtoon
      POSTGRES_DB: webtoon
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webtoon"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:24-alpine}
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_TEXT_MODEL: ${OPENAI_TEXT_MODEL:-gpt-5.5}
      OPENAI_IMAGE_MODEL: ${OPENAI_IMAGE_MODEL:-gpt-image-2}
      API_PORT: 4000
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: webtoon
      PGPASSWORD: webtoon
      PGDATABASE: webtoon
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-4000}:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:24-alpine}
        NGINX_IMAGE: ${NGINX_IMAGE:-nginx:alpine}
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-3030}:80"

volumes:
  pgdata:
