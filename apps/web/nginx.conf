server {
  listen 80;

  location /api/ {
    proxy_pass http://api:4000;
    proxy_set_header Host $host;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_read_timeout 1h;
    client_max_body_size 50m;
  }

  location / {
    root /usr/share/nginx/html;
    try_files $uri /index.html;
  }
}
