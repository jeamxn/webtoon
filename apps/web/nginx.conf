server {
  listen 80;

  location /api/ {
    proxy_pass http://api:4000;
    proxy_set_header Host $host;
    client_max_body_size 50m;
  }

  location /files/ {
    proxy_pass http://api:4000;
    proxy_set_header Host $host;
  }

  location / {
    root /usr/share/nginx/html;
    try_files $uri /index.html;
  }
}
